name: build-and-deploy-k8s-production

on:
  push:
    branches: ['main']

permissions:
  contents: read
  
concurrency:
  group: production-k8s-main
  cancel-in-progress: true

jobs:
  build_deploy:
    runs-on: self-hosted
    env:
      REGISTRY: 10.163.254.134:5000
      IMAGE_NAME: laboratorio-textil
      IMAGE_TAG: latest
      DEPLOYMENT_NAME: production
      CONTAINER_NAME: laboratorio-textil
      K8S_NAMESPACE: default


    steps:
      - uses: actions/checkout@v4
      
      - name: Create buildkit config 
        run: | 
          mkdir -p /tmp/buildkit 
          cat <<EOF > /tmp/buildkit/buildkitd.toml 
          [registry."10.163.254.134:5000"] 
            http = true 
            insecure = true 
          EOF


  # 🔥 BUILD NORMAL (sin buildx)
      - name: Set up Docker Buildx 
        uses: docker/setup-buildx-action@v3 
        with: 
          config: /tmp/buildkit/buildkitd.toml

  # 🔥 PUSH NORMAL (ya funciona con insecure registry)
      - name: Build and push image 
        uses: docker/build-push-action@v5 
        with: 
          context: . 
          push: true 
          tags: | 
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
  # 🚀 DEPLOY
      
      - name: Deploy to Kubernetes
        run: |
          kubectl -n "${namespace}" set image deployment/"${DEPLOYMENT_NAME}" \
            "${CONTAINER_NAME}"="${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"

          kubectl -n "${namespace}" rollout status deployment/"${DEPLOYMENT_NAME}" --timeout=300s

      - name: Verify Pods
        run: |
          namespace="${K8S_NAMESPACE:-default}"
          kubectl -n "${namespace}" get pods -o wide
