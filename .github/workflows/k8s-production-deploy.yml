name: build-and-deploy-k8s-production

on:
  push:
    branches: ['main']

permissions:
  contents: read

jobs:
  build_deploy:
     runs-on: self-hosted
     env:
       REGISTRY: 10.163.254.134:5000
       IMAGE_NAME: laboratorio-textil
       IMAGE_TAG: latest
       DEPLOYMENT_NAME: production
       CONTAINER_NAME: laboratorio-textil
       K8S_NAMESPACE: default
     steps:
       - name: Checkout
         uses: actions/checkout@v4
       - name: Build image
     run: |
         docker build -t ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG} .

       - name: Push image
      run: |
      docker push ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}

  - name: Deploy to Kubernetes
    run: |
      kubectl -n ${K8S_NAMESPACE} set image deployment/${DEPLOYMENT_NAME} \
        ${CONTAINER_NAME}=${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}

      kubectl -n ${K8S_NAMESPACE} rollout status deployment/${DEPLOYMENT_NAME} --timeout=300s

  - name: Verify Pods
    run: |
      kubectl -n ${K8S_NAMESPACE} get pods -o wide
