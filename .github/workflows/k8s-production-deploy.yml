name: build-and-deploy-k8s-production

on:
  push:
    branches: ['main']

permissions:
  contents: read

concurrency:
  group: production-k8s-main
  cancel-in-progress: true

jobs:
  build_deploy:
    if: github.repository == 'servicesgit-ccp/Laboratorio-de-Textil-PROD'
    runs-on: self-hosted
    env:
      REGISTRY: ccplabtxt:5000
      IMAGE_NAME: laboratorio-textil
      IMAGE_TAG: latest
      DEPLOYMENT_NAME: production
      CONTAINER_NAME: LaboratorioTextil
      K8S_NAMESPACE: default
      VITE_REVERB_APP_KEY: docker-app-key
      VITE_REVERB_HOST: ccplabtxt.agarcia.com.mx
      VITE_REVERB_PORT: 443
      VITE_REVERB_SCHEME: https
      VITE_REVERB_CLUSTER: mt1
    steps:
      - uses: actions/checkout@v4

      - name: Validate production config
        id: validate_env
        env:
          LARAVEL_ENV_PROD: ${{ secrets.LARAVEL_ENV_PROD }}
        run: |
          set -euo pipefail

          for required_var in \
            REGISTRY \
            IMAGE_NAME \
            DEPLOYMENT_NAME \
            CONTAINER_NAME \
            VITE_REVERB_APP_KEY \
            VITE_REVERB_HOST \
            VITE_REVERB_PORT \
            VITE_REVERB_SCHEME \
            VITE_REVERB_CLUSTER
          do
            if [ -z "${!required_var:-}" ]; then
              echo "::error::${required_var} is empty or unavailable."
              exit 1
            fi
          done

          if [ -z "${LARAVEL_ENV_PROD}" ]; then
            echo "::error::LARAVEL_ENV_PROD is empty or unavailable."
            exit 1
          fi

          tmp_env="$(mktemp)"
          printf '%s' "${LARAVEL_ENV_PROD}" | tr -d '\r' > "${tmp_env}"

          grep -qE '^APP_KEY=.+' "${tmp_env}" || {
            echo "::error::APP_KEY is missing in LARAVEL_ENV_PROD."
            exit 1
          }

          grep -qE '^DB_CONNECTION=.+' "${tmp_env}" || {
            echo "::error::DB_CONNECTION is missing in LARAVEL_ENV_PROD."
            exit 1
          }

          env_sha="$(sha256sum "${tmp_env}" | awk '{print $1}')"
          echo "env_sha=${env_sha}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          secrets: |
            laravel_env=${{ secrets.LARAVEL_ENV_PROD }}
          build-args: |
            APP_BUILD_REF=${{ github.sha }}
            LARAVEL_ENV_SHA=${{ steps.validate_env.outputs.env_sha }}
            VITE_REVERB_APP_KEY=docker-app-key
            VITE_REVERB_HOST=ccplabtxt.agarcia.com.mx
            VITE_REVERB_PORT=443
            VITE_REVERB_SCHEME=https
            VITE_REVERB_CLUSTER=mt1

      - name: Deploy to Kubernetes
        run: |
          set -euo pipefail
          namespace="${K8S_NAMESPACE:-default}"

          kubectl -n "${namespace}" set image deployment/"${DEPLOYMENT_NAME}" \
            "${CONTAINER_NAME}"="${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"

          kubectl -n "${namespace}" rollout status deployment/"${DEPLOYMENT_NAME}" --timeout=300s

      - name: Verify Pods
        run: |
          namespace="${K8S_NAMESPACE:-default}"
          kubectl -n "${namespace}" get pods
