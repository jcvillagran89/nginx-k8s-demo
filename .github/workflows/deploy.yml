name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Login to GHCR
      run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Build image
      run: |
        docker build -t ghcr.io/${{ github.repository }}:${{ github.sha }} .

    - name: Push image
      run: |
        docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
    - name: Deploy to Kubernetes
      run: |
        kubectl set image deployment/nginx-github nginx=ghcr.io/${{ github.repository }}:latest
        kubectl rollout status deployment/nginx-github
