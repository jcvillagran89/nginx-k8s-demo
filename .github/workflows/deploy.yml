name: Build and Deploy

on:
  push:
    branches: ['main']

jobs:
  build-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/jcvillagran89/nginx-k8s-demo:${{ github.sha }}

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/nginx-github \
          nginx=ghcr.io/jcvillagran89/nginx-k8s-demo:${{ github.sha }}
