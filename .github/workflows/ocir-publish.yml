name: build-and-push-ocir

on:
  push:
    branches: ['main']

jobs:
  build_push:
    # Run this workflow only from the current QA/UAT repository.
    if: github.repository == 'servicesgit-ccp/Laboratorio-de-Textil-UAT'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate QA env secret
        id: validate_env
        env:
          LARAVEL_ENV_QA: ${{ secrets.LARAVEL_ENV_QA }}
        run: |
          if [ -z "${LARAVEL_ENV_QA}" ]; then
            echo "::error::LARAVEL_ENV_QA is empty or unavailable. If this is an Environment secret, declare the job environment in this workflow."
            exit 1
          fi

          tmp_env="$(mktemp)"
          printf '%s' "${LARAVEL_ENV_QA}" | tr -d '\r' > "${tmp_env}"

          grep -qE '^APP_KEY=.+' "${tmp_env}" || {
            echo "::error::APP_KEY is missing in LARAVEL_ENV_QA."
            exit 1
          }

          grep -qE '^DB_CONNECTION=.+' "${tmp_env}" || {
            echo "::error::DB_CONNECTION is missing in LARAVEL_ENV_QA."
            exit 1
          }

          env_sha="$(sha256sum "${tmp_env}" | awk '{print $1}')"
          echo "env_sha=${env_sha}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to OCIR
        uses: docker/login-action@v3
        with:
          registry: iad.ocir.io
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_PASSWORD }}

      - name: Generate date tag
        id: image_tag
        run: echo "date_tag=$(TZ=America/Mexico_City date +'%d%m%Y')" >> "$GITHUB_OUTPUT"

      - name: Build and push (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          secrets: |
            laravel_env=${{ secrets.LARAVEL_ENV_QA }}
          build-args: |
            APP_BUILD_REF=${{ github.sha }}
            LARAVEL_ENV_SHA=${{ steps.validate_env.outputs.env_sha }}
            VITE_REVERB_APP_KEY=docker-app-key
            VITE_REVERB_HOST=laboratoriotextilqa.agarcia.com.mx
            VITE_REVERB_PORT=443
            VITE_REVERB_SCHEME=https
            VITE_REVERB_CLUSTER=mt1
          push: true
          tags: |
            iad.ocir.io/idfyycoyytvx/laboratorio-textiles-qa:${{ github.sha }}
            iad.ocir.io/idfyycoyytvx/laboratorio-textiles-qa:${{ steps.image_tag.outputs.date_tag }}
            iad.ocir.io/idfyycoyytvx/laboratorio-textiles-qa:ImagenUAT
